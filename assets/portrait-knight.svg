<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#9c845c"/>
      <stop offset="55%" stop-color="#4a3018"/>
      <stop offset="100%" stop-color="#1a0c04"/>
    </radialGradient>
    <linearGradient id="armor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8c0b0"/>
      <stop offset="45%" stop-color="#6a6054"/>
      <stop offset="100%" stop-color="#1c1409"/>
    </linearGradient>
    <linearGradient id="armorD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#675a48"/>
      <stop offset="100%" stop-color="#181008"/>
    </linearGradient>
    <linearGradient id="cape" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9a1f24"/>
      <stop offset="100%" stop-color="#3a0a0e"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f4d878"/>
      <stop offset="60%" stop-color="#b88018"/>
      <stop offset="100%" stop-color="#5a3a0a"/>
    </radialGradient>
  </defs>

  <rect width="200" height="240" fill="url(#bg)"/>

  <!-- Banner/cloak behind shoulders -->
  <path d="M 30 130 Q 20 220 30 240 L 70 240 Q 60 200 70 140 Z" fill="url(#cape)" opacity="0.85"/>
  <path d="M 170 130 Q 180 220 170 240 L 130 240 Q 140 200 130 140 Z" fill="url(#cape)" opacity="0.85"/>

  <!-- Pauldrons -->
  <ellipse cx="50" cy="160" rx="32" ry="22" fill="url(#armor)"/>
  <ellipse cx="150" cy="160" rx="32" ry="22" fill="url(#armor)"/>
  <ellipse cx="50" cy="160" rx="20" ry="12" fill="url(#armorD)"/>
  <ellipse cx="150" cy="160" rx="20" ry="12" fill="url(#armorD)"/>

  <!-- Torso plate -->
  <path d="M 60 170 Q 55 200 60 240 L 140 240 Q 145 200 140 170 Q 100 160 60 170 Z" fill="url(#armor)"/>
  <!-- Sun emblem on chest -->
  <circle cx="100" cy="205" r="20" fill="url(#sun)"/>
  <g fill="#b88018">
    <polygon points="100,176 105,200 95,200"/>
    <polygon points="100,234 105,210 95,210"/>
    <polygon points="71,205 95,210 95,200"/>
    <polygon points="129,205 105,210 105,200"/>
    <polygon points="80,185 95,200 90,205"/>
    <polygon points="120,185 105,200 110,205"/>
    <polygon points="80,225 90,205 95,210"/>
    <polygon points="120,225 110,205 105,210"/>
  </g>

  <!-- Neck shadow -->
  <rect x="86" y="130" width="28" height="20" fill="#1a1208"/>

  <!-- Head with closed helmet -->
  <ellipse cx="100" cy="90" rx="42" ry="52" fill="url(#armor)"/>
  <!-- Helmet face plate seam -->
  <path d="M 60 90 Q 100 80 140 90" fill="none" stroke="#0a0500" stroke-width="2"/>
  <!-- Visor slit -->
  <rect x="68" y="85" width="64" height="6" fill="#0a0500"/>
  <!-- Vertical strut -->
  <rect x="97" y="55" width="6" height="60" fill="#1a0e04"/>
  <!-- Helmet rivets -->
  <circle cx="68" cy="65" r="2.5" fill="#3a2810"/>
  <circle cx="132" cy="65" r="2.5" fill="#3a2810"/>
  <circle cx="68" cy="115" r="2.5" fill="#3a2810"/>
  <circle cx="132" cy="115" r="2.5" fill="#3a2810"/>

  <!-- Plume base -->
  <rect x="92" y="38" width="16" height="14" fill="url(#armorD)"/>
  <!-- Red plume cascading -->
  <path d="M 100 38 Q 78 22 70 -4 Q 86 18 100 38 Z" fill="#9a1f24"/>
  <path d="M 100 38 Q 122 22 130 -4 Q 114 18 100 38 Z" fill="#6a121a"/>
  <path d="M 100 38 Q 90 18 88 -4 Q 96 18 100 38 Z" fill="#c92b30"/>

  <!-- Edge fog/vignette -->
  <rect width="200" height="240" fill="url(#bg)" opacity="0" />
  <ellipse cx="100" cy="220" rx="100" ry="30" fill="#1a0c04" opacity="0.5"/>
</svg>
