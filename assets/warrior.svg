<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 380" preserveAspectRatio="xMidYMax meet">
  <defs>
    <radialGradient id="bgW" cx="50%" cy="22%" r="70%">
      <stop offset="0%" stop-color="#c89870"/>
      <stop offset="55%" stop-color="#6a4628"/>
      <stop offset="100%" stop-color="#2a1808"/>
    </radialGradient>
    <linearGradient id="leather" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a06838"/>
      <stop offset="100%" stop-color="#3a1c08"/>
    </linearGradient>
    <linearGradient id="leatherDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#52341a"/>
      <stop offset="100%" stop-color="#1a0e02"/>
    </linearGradient>
    <linearGradient id="cloth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcc090"/>
      <stop offset="100%" stop-color="#7a5828"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c9a4"/>
      <stop offset="100%" stop-color="#8a5a32"/>
    </linearGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a4818"/>
      <stop offset="100%" stop-color="#2a1404"/>
    </linearGradient>
    <linearGradient id="axeBlade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d8d2c4"/>
      <stop offset="50%" stop-color="#8a8478"/>
      <stop offset="100%" stop-color="#3a342a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="280" height="380" fill="url(#bgW)"/>
  <ellipse cx="140" cy="300" rx="140" ry="40" fill="#1a0e04" opacity="0.6"/>

  <!-- Cloak behind -->
  <path d="M 75 150 Q 50 250 60 360 L 95 360 Q 88 250 105 160 Z" fill="url(#leatherDark)"/>
  <path d="M 205 150 Q 230 250 220 360 L 185 360 Q 192 250 175 160 Z" fill="url(#leatherDark)"/>

  <!-- Axe shaft (held diagonally) -->
  <rect x="200" y="105" width="6" height="180" fill="#3a2410" transform="rotate(15 203 195)"/>

  <!-- Skirt / leather flaps -->
  <path d="M 100 250 L 90 360 L 130 360 L 132 255 Z" fill="url(#leatherDark)"/>
  <path d="M 132 255 L 148 360 L 138 360 L 138 256 Z" fill="url(#leather)"/>
  <path d="M 148 255 L 170 360 L 180 360 L 180 256 Z" fill="url(#leatherDark)"/>
  <path d="M 165 255 L 175 360 L 200 360 L 190 250 Z" fill="url(#leather)"/>

  <!-- Boots -->
  <path d="M 105 340 L 100 365 L 135 365 L 132 340 Z" fill="#3a1c08"/>
  <path d="M 148 340 L 145 365 L 180 365 L 175 340 Z" fill="#3a1c08"/>
  <rect x="100" y="358" width="40" height="10" fill="#1a0d02"/>
  <rect x="145" y="358" width="40" height="10" fill="#1a0d02"/>

  <!-- Belt -->
  <rect x="98" y="245" width="84" height="14" fill="#3a1c08"/>
  <rect x="135" y="244" width="12" height="16" fill="#b88018"/>
  <circle cx="141" cy="252" r="3" fill="#3a1c08"/>

  <!-- Torso / corset leather armor -->
  <path d="M 108 165 Q 100 200 105 250 Q 140 258 175 250 Q 180 200 172 165 Z" fill="url(#leather)"/>
  <!-- Lacing down center -->
  <line x1="140" y1="172" x2="140" y2="240" stroke="#1a0d02" stroke-width="1.2" stroke-dasharray="3,3"/>
  <!-- Cleavage shadow -->
  <path d="M 130 165 Q 140 200 150 165 Z" fill="#52341a" opacity="0.6"/>
  <!-- Cloth underneath at collar -->
  <path d="M 118 162 Q 140 175 162 162 L 162 170 Q 140 180 118 170 Z" fill="url(#cloth)"/>

  <!-- Shoulder armor -->
  <ellipse cx="100" cy="160" rx="20" ry="14" fill="url(#leather)"/>
  <ellipse cx="180" cy="160" rx="20" ry="14" fill="url(#leather)"/>
  <ellipse cx="100" cy="160" rx="12" ry="6" fill="url(#leatherDark)"/>
  <ellipse cx="180" cy="160" rx="12" ry="6" fill="url(#leatherDark)"/>

  <!-- Arms -->
  <!-- Left arm relaxed -->
  <path d="M 86 170 Q 75 210 82 245 L 100 245 Q 105 210 100 168 Z" fill="url(#skin)"/>
  <!-- Right arm holding axe — raised -->
  <path d="M 190 170 Q 200 195 215 220 L 200 232 Q 188 210 178 168 Z" fill="url(#skin)"/>

  <!-- Hands (gloves) -->
  <ellipse cx="91" cy="248" rx="12" ry="9" fill="url(#leatherDark)"/>
  <ellipse cx="213" cy="222" rx="11" ry="8" fill="url(#leatherDark)" transform="rotate(20 213 222)"/>

  <!-- Axe head (broad blade with curve) -->
  <g transform="rotate(15 203 145)">
    <path d="M 195 110 Q 175 130 180 160 Q 220 160 225 130 Q 218 108 195 110 Z" fill="url(#axeBlade)"/>
    <path d="M 198 116 Q 184 130 188 156 Q 218 156 222 130 Q 218 115 198 116 Z" fill="none" stroke="#5a4830" stroke-width="1.2"/>
    <!-- Back spike -->
    <path d="M 205 110 L 215 100 L 220 108 L 212 116 Z" fill="#5a4830"/>
  </g>

  <!-- Neck -->
  <rect x="132" y="135" width="16" height="20" fill="url(#skin)"/>

  <!-- Head -->
  <ellipse cx="140" cy="115" rx="22" ry="28" fill="url(#skin)"/>
  <!-- Hair -->
  <path d="M 118 100 Q 110 80 125 70 Q 140 60 158 72 Q 168 82 162 100 Q 168 130 175 165 Q 145 180 110 168 Q 115 135 118 100 Z" fill="url(#hair)"/>
  <!-- Face highlights -->
  <ellipse cx="132" cy="118" rx="2" ry="3" fill="#2a1808"/>
  <ellipse cx="148" cy="118" rx="2" ry="3" fill="#2a1808"/>
  <path d="M 134 130 Q 140 134 146 130" fill="none" stroke="#5a3010" stroke-width="1.2"/>
  <path d="M 130 110 L 134 110" stroke="#3a1c08" stroke-width="1.5"/>
  <path d="M 146 110 L 150 110" stroke="#3a1c08" stroke-width="1.5"/>

  <!-- Hair strands on front -->
  <path d="M 120 95 Q 125 130 122 165" fill="none" stroke="#3a1c08" stroke-width="2"/>
  <path d="M 160 95 Q 165 130 168 165" fill="none" stroke="#3a1c08" stroke-width="2"/>
</svg>
