<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6e93c0"/>
      <stop offset="60%" stop-color="#b0c6dc"/>
      <stop offset="100%" stop-color="#d8c8a8"/>
    </linearGradient>
    <linearGradient id="distantHill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a6878"/>
      <stop offset="100%" stop-color="#3a4854"/>
    </linearGradient>
    <linearGradient id="wallStone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4a878"/>
      <stop offset="100%" stop-color="#6a4a26"/>
    </linearGradient>
    <linearGradient id="wallShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9a7a52"/>
      <stop offset="100%" stop-color="#3a2010"/>
    </linearGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a1218"/>
      <stop offset="100%" stop-color="#3a0a0e"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a5a30"/>
      <stop offset="100%" stop-color="#2a1808"/>
    </linearGradient>
    <radialGradient id="fountain" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#a8c4dc"/>
      <stop offset="70%" stop-color="#3a5a80"/>
      <stop offset="100%" stop-color="#1a2a40"/>
    </radialGradient>
    <linearGradient id="banner1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a72325"/>
      <stop offset="100%" stop-color="#6a131a"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="400" height="120" fill="url(#sky)"/>

  <!-- Distant mountains -->
  <path d="M 0 100 L 60 70 L 110 90 L 160 60 L 220 95 L 280 65 L 350 88 L 400 75 L 400 120 L 0 120 Z" fill="url(#distantHill)" opacity="0.5"/>

  <!-- Clouds -->
  <ellipse cx="80" cy="40" rx="40" ry="8" fill="#fff" opacity="0.4"/>
  <ellipse cx="240" cy="30" rx="50" ry="9" fill="#fff" opacity="0.35"/>

  <!-- City wall behind -->
  <rect x="0" y="100" width="400" height="50" fill="url(#wallStone)"/>
  <!-- Crenelations -->
  <g fill="url(#wallStone)">
    <rect x="0" y="92" width="12" height="10"/>
    <rect x="22" y="92" width="12" height="10"/>
    <rect x="44" y="92" width="12" height="10"/>
    <rect x="386" y="92" width="14" height="10"/>
  </g>

  <!-- Left tower (round) -->
  <rect x="10" y="50" width="44" height="100" fill="url(#wallStone)"/>
  <rect x="14" y="55" width="36" height="3" fill="url(#wallShade)"/>
  <rect x="14" y="75" width="36" height="3" fill="url(#wallShade)"/>
  <rect x="14" y="100" width="36" height="3" fill="url(#wallShade)"/>
  <!-- Tower windows -->
  <rect x="28" y="80" width="8" height="14" fill="#1a0a04"/>
  <rect x="28" y="105" width="8" height="14" fill="#1a0a04"/>
  <!-- Tower roof -->
  <polygon points="6,50 58,50 32,18" fill="url(#roof)"/>
  <rect x="30" y="14" width="4" height="10" fill="#2a1808"/>
  <rect x="34" y="6" width="16" height="10" fill="url(#banner1)"/>

  <!-- Center main tower (tallest) -->
  <rect x="170" y="20" width="62" height="130" fill="url(#wallStone)"/>
  <rect x="174" y="30" width="54" height="3" fill="url(#wallShade)"/>
  <rect x="174" y="55" width="54" height="3" fill="url(#wallShade)"/>
  <rect x="174" y="85" width="54" height="3" fill="url(#wallShade)"/>
  <rect x="174" y="115" width="54" height="3" fill="url(#wallShade)"/>
  <!-- Center tower windows (arched) -->
  <path d="M 192 45 L 192 65 L 200 65 L 200 45 Q 196 39 192 45 Z" fill="#1a0a04"/>
  <path d="M 208 45 L 208 65 L 216 65 L 216 45 Q 212 39 208 45 Z" fill="#1a0a04"/>
  <path d="M 192 80 L 192 105 L 200 105 L 200 80 Q 196 73 192 80 Z" fill="#1a0a04"/>
  <path d="M 208 80 L 208 105 L 216 105 L 216 80 Q 212 73 208 80 Z" fill="#1a0a04"/>
  <!-- Main door -->
  <path d="M 188 125 L 188 150 L 214 150 L 214 125 Q 201 110 188 125 Z" fill="#1a0a04"/>
  <!-- Center tower roof -->
  <polygon points="166,20 236,20 201,-20" fill="url(#roof)"/>
  <polygon points="166,20 236,20 201,-20" fill="none" stroke="#2a0508" stroke-width="1"/>
  <rect x="198" y="-22" width="6" height="14" fill="#2a1808"/>
  <rect x="204" y="-30" width="20" height="12" fill="url(#banner1)"/>
  <path d="M 224 -30 L 224 -18 L 218 -24 Z" fill="url(#banner1)"/>

  <!-- Right-mid tower -->
  <rect x="290" y="40" width="38" height="110" fill="url(#wallStone)"/>
  <rect x="294" y="50" width="30" height="3" fill="url(#wallShade)"/>
  <rect x="294" y="75" width="30" height="3" fill="url(#wallShade)"/>
  <rect x="294" y="105" width="30" height="3" fill="url(#wallShade)"/>
  <rect x="304" y="80" width="8" height="14" fill="#1a0a04"/>
  <polygon points="286,40 332,40 309,10" fill="url(#roof)"/>
  <rect x="307" y="6" width="4" height="10" fill="#2a1808"/>
  <rect x="311" y="-2" width="14" height="10" fill="url(#banner1)"/>

  <!-- Right small tower -->
  <rect x="350" y="65" width="32" height="85" fill="url(#wallShade)"/>
  <rect x="354" y="80" width="24" height="3" fill="url(#wallStone)"/>
  <rect x="354" y="105" width="24" height="3" fill="url(#wallStone)"/>
  <rect x="360" y="90" width="8" height="14" fill="#1a0a04"/>
  <polygon points="346,65 386,65 366,38" fill="url(#roof)"/>

  <!-- Ground -->
  <rect x="0" y="148" width="400" height="72" fill="url(#ground)"/>
  <!-- Cobblestones -->
  <g stroke="#2a1808" stroke-width="0.8" fill="none" opacity="0.5">
    <path d="M 0 160 L 400 160"/>
    <path d="M 0 175 L 400 175"/>
    <path d="M 0 190 L 400 190"/>
    <path d="M 0 205 L 400 205"/>
    <path d="M 20 148 L 22 220"/>
    <path d="M 60 148 L 64 220"/>
    <path d="M 120 148 L 126 220"/>
    <path d="M 180 148 L 188 220"/>
    <path d="M 240 148 L 248 220"/>
    <path d="M 300 148 L 308 220"/>
    <path d="M 350 148 L 358 220"/>
  </g>

  <!-- Fountain in foreground -->
  <ellipse cx="200" cy="200" rx="50" ry="10" fill="#1a1208" opacity="0.5"/>
  <!-- Fountain basin -->
  <ellipse cx="200" cy="195" rx="46" ry="9" fill="url(#wallShade)"/>
  <ellipse cx="200" cy="192" rx="46" ry="8" fill="url(#wallStone)"/>
  <ellipse cx="200" cy="190" rx="38" ry="6" fill="url(#fountain)"/>
  <!-- Fountain center post -->
  <rect x="195" y="170" width="10" height="22" fill="url(#wallShade)"/>
  <ellipse cx="200" cy="170" rx="12" ry="4" fill="url(#wallStone)"/>
  <!-- Water dripping/sparkle -->
  <ellipse cx="200" cy="186" rx="14" ry="2" fill="#a8c4dc" opacity="0.7"/>
  <line x1="195" y1="170" x2="195" y2="186" stroke="#a8c4dc" stroke-width="1" opacity="0.6"/>
  <line x1="205" y1="170" x2="205" y2="186" stroke="#a8c4dc" stroke-width="1" opacity="0.6"/>

  <!-- Atmospheric fog -->
  <rect x="0" y="140" width="400" height="20" fill="url(#sky)" opacity="0.3"/>
  <ellipse cx="200" cy="155" rx="200" ry="14" fill="#dcc090" opacity="0.25"/>
</svg>
